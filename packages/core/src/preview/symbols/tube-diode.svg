    <line x1="0" y1="-5" x2="0" y2="-20"/>
    <line x1="0" y1="5" x2="0" y2="20"/>
  </g>
  <circle cx="0" cy="0" r="11"/>
  <line x1="-5" y1="-5" x2="5" y2="-5"/>
  <line x1="-4" y1="5" x2="4" y2="5"/>
</svg>

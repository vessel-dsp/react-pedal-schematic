name: Publish to npm

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    contents: read
    id-token: write

concurrency:
    group: npm-publish
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.2.2

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: https://registry.npmjs.org
                  scope: '@vessel-dsp'

            - run: bun install --frozen-lockfile

            - name: Verify package
              run: bun run pack:dry-run

            - name: Publish package
              run: npm publish --workspace @vessel-dsp/core --access public --provenance
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

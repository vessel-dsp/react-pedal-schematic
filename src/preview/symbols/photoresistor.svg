<svg xmlns="http://www.w3.org/2000/svg" viewBox="-25 -25 50 50" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!--
    kind: photoresistor (LDR)
    terminals: a (SVG 0,-20), b (SVG 0,20)
